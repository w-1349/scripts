name: 103516专用一键转Egern
description: |
  专门适配 loon.103516.xyz 路径结构。
  支持 .lpx 和 .plugin 后缀。
author: Gemini Custom
body_rewrites:
- response_regex:
    # 匹配你提供的 loon.103516.xyz 域名（移除了 lab 字符以匹配真实链接）
    match: ^https?:\/\/loon\.103516\.xyz\/.*
    # 寻找以 .lpx 或 .plugin 结尾的完整链接
    find: (https?:\/\/loon\.103516\.xyz\/Plugin\/.*?\.(lpx|plugin))
    # 转换为 Egern + ScriptHub 链接
    replace: egern:///modules/new?url=http://script.hub/file/_start_/$1/_end_/converted.sgmodule%3Ftype%3Dloon-plugin%26target%3Dsurge-module%26del%3Dtrue%26jqEnabled%3Dtrue
mitm:
  hostnames:
    includes:
    - loon.103516.xyz
